# Vantage — local stack.
#   web  : the Vulnerability Console (static, nginx)        -> http://localhost:8137
#   api  : the read-only FastAPI service (seed-backed)      -> http://localhost:8138
#   db   : Postgres 16 with db/schema.sql auto-applied       -> localhost:5432
#
# The api currently serves seed data; db is provisioned (and the schema is
# validated on init) ready for the next phase when the API moves off the seed.
#
# Run:  docker compose up --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vantage
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - vantage-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vantage"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "8138:8138"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vantage
      # --- Auth/RBAC (AD/LDAP + OIDC) — see docs/auth-contract.md -------------
      # Left OFF for the local/reference stack: an unauthenticated caller is the
      # synthetic `dev` admin (actor is still server-derived). To turn on real
      # auth, set AUTH_REQUIRED=true and the OIDC/LDAP vars below (secrets via the
      # vault, NOT committed), and a strong SESSION_SECRET.
      AUTH_REQUIRED: "false"
      # SESSION_SECRET: "<from vault>"
      # SESSION_COOKIE_SECURE: "true"
      # OIDC_ISSUER: "https://login.microsoftonline.com/<tenant>/v2.0"
      # OIDC_CLIENT_ID: "<app id>"
      # OIDC_CLIENT_SECRET: "<from vault>"
      # OIDC_REDIRECT_URI: "https://vantage.internal/api/auth/callback"
      # VANTAGE_GROUP_ROLE_MAP: '{"SEC-AppSec":"analyst","SEC-CISO":"approver_ciso","SEC-VantageAdmins":"admin"}'
      # LDAP_URL: "ldaps://dc.corp.example:636"
      # LDAP_BIND_DN: "<service account>"
      # LDAP_BIND_PASSWORD: "<from vault>"
      # LDAP_USER_BASE: "OU=Users,DC=corp,DC=example"
    depends_on:
      db:
        condition: service_healthy
    # Liveness from the image HEALTHCHECK (Python urllib -> /api/health); declared
    # here too so `condition: service_healthy` gates the web container.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8138/api/health',timeout=4).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # The hardened console image runs nginx UNPRIVILEGED (uid 101) and listens on
    # 8080 inside the container; publish it on the host's 8137.
    ports:
      - "8137:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # On-demand live scanner (nmap + the scope-gated run_scan CLI). NOT started by
  # `docker compose up` — it's behind the "scan" profile. Run it explicitly:
  #   docker compose run --rm scanner --target 127.0.0.1
  #   docker compose run --rm scanner --target host.docker.internal --json /out/scan.json
  #   docker compose run --rm scanner --target 8.8.8.8     # REFUSED, exit 2
  scanner:
    profiles: ["scan"]
    build:
      context: ./orchestrator
      dockerfile: Dockerfile.scanner
    # Lets `--target host.docker.internal` resolve to your machine on Linux too
    # (Docker Desktop adds this automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # `--json /out/<name>.json` lands the register here on the host.
    volumes:
      - ./scan-output:/out

volumes:
  vantage-db:
