# Vantage — local stack.
#   web  : the Vulnerability Console (static, nginx)        -> http://localhost:8137
#   api  : the read-only FastAPI service (seed-backed)      -> http://localhost:8138
#   db   : Postgres 16 with db/schema.sql auto-applied       -> localhost:5432
#
# The api currently serves seed data; db is provisioned (and the schema is
# validated on init) ready for the next phase when the API moves off the seed.
#
# Run:  docker compose up --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vantage
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - vantage-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vantage"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "8138:8138"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vantage
      # --- Auth/RBAC (AD/LDAP + OIDC) — see docs/auth-contract.md -------------
      # Left OFF for the local/reference stack: an unauthenticated caller is the
      # synthetic `dev` admin (actor is still server-derived). To turn on real
      # auth, set AUTH_REQUIRED=true and the OIDC/LDAP vars below (secrets via the
      # vault, NOT committed), and a strong SESSION_SECRET.
      AUTH_REQUIRED: "false"
      # SESSION_SECRET: "<from vault>"
      # SESSION_COOKIE_SECURE: "true"
      # OIDC_ISSUER: "https://login.microsoftonline.com/<tenant>/v2.0"
      # OIDC_CLIENT_ID: "<app id>"
      # OIDC_CLIENT_SECRET: "<from vault>"
      # OIDC_REDIRECT_URI: "https://vantage.internal/api/auth/callback"
      # VANTAGE_GROUP_ROLE_MAP: '{"SEC-AppSec":"analyst","SEC-CISO":"approver_ciso","SEC-VantageAdmins":"admin"}'
      # LDAP_URL: "ldaps://dc.corp.example:636"
      # LDAP_BIND_DN: "<service account>"
      # LDAP_BIND_PASSWORD: "<from vault>"
      # LDAP_USER_BASE: "OU=Users,DC=corp,DC=example"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8137:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  vantage-db:
